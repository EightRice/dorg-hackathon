<!DOCTYPE html>
<html>
<head>
  <!--
    If you are serving your web app in a path other than the root, change the
    href value below to reflect the base path you are serving from.

    The path provided below has to start and end with a slash "/" in order for
    it to work correctly.

    For more details:
    * https://developer.mozilla.org/en-US/docs/Web/HTML/Element/base

    This is a placeholder for base href that will be replaced by the value of
    the `--base-href` argument provided to `flutter build`.
  -->
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="dOrg AI Sales Agent Hackathon Dashboard">

  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="dOrg Hackathon">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png"/>

  <title>dOrg Sales Agent Hackathon</title>
  <link rel="manifest" href="manifest.json">

  <style>
    body {
      margin: 0;
      padding: 0;
      background-color: #121218;
      overflow: hidden;
    }
    #game-of-life-canvas {
      position: fixed;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      z-index: -1;
      pointer-events: none;
    }
    /* p5.js creates a canvas element inside the container */
    #game-of-life-canvas canvas {
      display: block;
      opacity: 0.3;
    }
  </style>
</head>
<body>
  <div id="game-of-life-canvas"></div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.0/p5.min.js"></script>
  <script>
    (function() {
      const palette = [
        [95, 110, 239],
        [230, 86, 136],
        [255, 123, 34],
        [239, 238, 2],
        [115, 242, 95],
        [68, 148, 248],
      ];

      const resolution = 10;
      let cols, rows;
      let grid, nextGrid;

      function makeGrid(c, r) {
        let arr = new Array(c);
        for (let i = 0; i < c; i++) {
          arr[i] = new Array(r).fill(0);
        }
        return arr;
      }

      function randomizeGrid() {
        for (let i = 0; i < cols; i++) {
          for (let j = 0; j < rows; j++) {
            grid[i][j] = Math.random() > 0.75 ? 1 : 0;
          }
        }
      }

      function countNeighbors(g, x, y) {
        let sum = 0;
        for (let i = -1; i <= 1; i++) {
          for (let j = -1; j <= 1; j++) {
            if (i === 0 && j === 0) continue;
            let ci = (x + i + cols) % cols;
            let cj = (y + j + rows) % rows;
            sum += g[ci][cj];
          }
        }
        return sum;
      }

      function getColorForRow(j) {
        let t = j / rows;
        let scaledT = t * (palette.length - 1);
        let idx = Math.floor(scaledT);
        let frac = scaledT - idx;
        if (idx >= palette.length - 1) {
          return palette[palette.length - 1];
        }
        let c1 = palette[idx];
        let c2 = palette[idx + 1];
        return [
          c1[0] + (c2[0] - c1[0]) * frac,
          c1[1] + (c2[1] - c1[1]) * frac,
          c1[2] + (c2[2] - c1[2]) * frac,
        ];
      }

      const sketch = function(p) {
        p.setup = function() {
          let canvas = p.createCanvas(p.windowWidth, p.windowHeight);
          cols = Math.floor(p.width / resolution);
          rows = Math.floor(p.height / resolution);
          grid = makeGrid(cols, rows);
          nextGrid = makeGrid(cols, rows);
          randomizeGrid();
          p.frameRate(10);
          p.noStroke();
        };

        p.draw = function() {
          p.background(18, 18, 24);

          for (let i = 0; i < cols; i++) {
            for (let j = 0; j < rows; j++) {
              if (grid[i][j] === 1) {
                let c = getColorForRow(j);
                p.fill(c[0], c[1], c[2]);
                p.rect(i * resolution, j * resolution, resolution, resolution);
              }
            }
          }

          // Compute next generation
          for (let i = 0; i < cols; i++) {
            for (let j = 0; j < rows; j++) {
              let neighbors = countNeighbors(grid, i, j);
              if (grid[i][j] === 0 && neighbors === 3) {
                nextGrid[i][j] = 1;
              } else if (grid[i][j] === 1 && (neighbors === 2 || neighbors === 3)) {
                nextGrid[i][j] = 1;
              } else {
                nextGrid[i][j] = 0;
              }
            }
          }

          // Swap grids
          let temp = grid;
          grid = nextGrid;
          nextGrid = temp;
        };

        p.windowResized = function() {
          p.resizeCanvas(p.windowWidth, p.windowHeight);
          let newCols = Math.floor(p.width / resolution);
          let newRows = Math.floor(p.height / resolution);
          let newGrid = makeGrid(newCols, newRows);
          for (let i = 0; i < Math.min(cols, newCols); i++) {
            for (let j = 0; j < Math.min(rows, newRows); j++) {
              newGrid[i][j] = grid[i][j];
            }
          }
          // Fill any new area randomly
          for (let i = 0; i < newCols; i++) {
            for (let j = 0; j < newRows; j++) {
              if (i >= cols || j >= rows) {
                newGrid[i][j] = Math.random() > 0.75 ? 1 : 0;
              }
            }
          }
          cols = newCols;
          rows = newRows;
          grid = newGrid;
          nextGrid = makeGrid(cols, rows);
        };

        // Mouse trail activates cells near cursor (radius 4)
        p.mouseMoved = function() {
          let mx = Math.floor(p.mouseX / resolution);
          let my = Math.floor(p.mouseY / resolution);
          let radius = 4;
          for (let i = -radius; i <= radius; i++) {
            for (let j = -radius; j <= radius; j++) {
              if (i * i + j * j <= radius * radius) {
                let ci = (mx + i + cols) % cols;
                let cj = (my + j + rows) % rows;
                if (ci >= 0 && ci < cols && cj >= 0 && cj < rows) {
                  grid[ci][cj] = 1;
                }
              }
            }
          }
        };
      };

      // Wait for DOM to be ready, then create the p5 instance
      if (document.readyState === 'loading') {
        document.addEventListener('DOMContentLoaded', function() {
          new p5(sketch, 'game-of-life-canvas');
        });
      } else {
        new p5(sketch, 'game-of-life-canvas');
      }
    })();
  </script>

  <script src="flutter_bootstrap.js" async></script>
</body>
</html>

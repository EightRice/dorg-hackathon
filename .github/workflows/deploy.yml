name: Deploy Hackathon Dashboard to EC2

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  EC2_HOST: ec2-13-48-23-15.eu-north-1.compute.amazonaws.com
  EC2_USER: ubuntu
  DEPLOY_PATH: /home/ubuntu/hackathon-web

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable

      - run: flutter pub get
      - run: flutter analyze
      - run: flutter build web --release --base-href /

      - uses: actions/upload-artifact@v4
        with:
          name: web-build
          path: build/web/

  deploy:
    needs: build
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: web-build
          path: web/

      - name: Configure SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.EC2_SSH_KEY }}" > ~/.ssh/ec2.pem
          chmod 600 ~/.ssh/ec2.pem
          ssh-keyscan -H ${{ env.EC2_HOST }} >> ~/.ssh/known_hosts 2>/dev/null

      - name: Deploy to EC2
        run: |
          ssh -i ~/.ssh/ec2.pem ${{ env.EC2_USER }}@${{ env.EC2_HOST }} \
            "mkdir -p ${{ env.DEPLOY_PATH }}"

          rsync -avz --delete \
            -e "ssh -i ~/.ssh/ec2.pem" \
            web/ ${{ env.EC2_USER }}@${{ env.EC2_HOST }}:${{ env.DEPLOY_PATH }}/
